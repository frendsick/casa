name: Test example programs

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Load Casa release tag
      run: |
        set -euo pipefail
        release_line=$(grep -E '^CASAC_RELEASE_TAG=' casa-release.env || true)
        line_count=$(printf '%s\n' "$release_line" | grep -c '^CASAC_RELEASE_TAG=' || true)
        if [ "$line_count" -ne 1 ]; then
          echo "casa-release.env must contain exactly one CASAC_RELEASE_TAG entry" >&2
          exit 1
        fi
        CASAC_RELEASE_TAG=${release_line#CASAC_RELEASE_TAG=}
        if ! printf '%s\n' "$CASAC_RELEASE_TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
          echo "CASAC_RELEASE_TAG contains unsupported characters: ${CASAC_RELEASE_TAG}" >&2
          exit 1
        fi
        if ! printf '%s\n' "$CASAC_RELEASE_TAG" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9._-]+)?$'; then
          echo "CASAC_RELEASE_TAG must look like a Casa release tag: ${CASAC_RELEASE_TAG}" >&2
          exit 1
        fi
        printf 'CASAC_RELEASE_TAG=%s\n' "$CASAC_RELEASE_TAG" >> "$GITHUB_ENV"
    - name: Download casac release binary
      run: |
        curl --silent --location --fail \
          --output casac-release \
          "https://github.com/frendsick/casa/releases/download/${CASAC_RELEASE_TAG}/casac"
        chmod +x casac-release
    - name: Bootstrap stage1 compiler from branch
      run: ./casac-release -L lib casa.casa -o casac-stage1
    - name: Test example programs
      run: CASA_COMPILER=./casac-stage1 ./tests/test_examples.sh
